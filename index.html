<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pontocego.oni | Portfólio de Crochê</title>
    <link rel="icon" type="image/png" href="public/favicon.png">
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <!-- PRELOADER -->
    <div id="preloader">
      <span>Carregando...</span>
    </div>

    <!-- HERO SECTION -->
    <header id="hero">
      <button id="btn-adentrar">Adentrar</button>
    </header>

    <!-- MAIN CONTENT -->
    <main>
      <!-- MENU DE FILTROS -->
      <nav class="filtros">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="mascaras">Máscaras</button>
        <button class="filter-btn" data-filter="vestuario">Vestuário</button>
        <button class="filter-btn" data-filter="bolsas">Bolsas</button>
        <button class="filter-btn" data-filter="decoracao">Decoração</button>
      </nav>

      <!-- GALERIA -->
      <section id="galeria" class="masonry-grid">
        
        <article class="item mascaras">
          <img src="https://placehold.co/1080x1350/0d0d0d/8b0000?text=Hannya+Mask" alt="Máscara">
          <div class="item-info">Hannya Clássica</div>
        </article>

        <article class="item vestuario">
          <img src="https://placehold.co/1080x1350/1a1a1a/e0e0e0?text=Balaclava" alt="Balaclava">
          <div class="item-info">Balaclava Urbana</div>
        </article>

        <article class="item decoracao">
          <img src="https://placehold.co/1080x1080/1a1a1a/e0e0e0?text=Trilho+de+Mesa" alt="Trilho de Mesa">
          <div class="item-info">Trilho de Mesa Dark</div>
        </article>

        <article class="item bolsas">
          <img src="https://placehold.co/1080x1080/0d0d0d/8b0000?text=Tote+Bag" alt="Bolsa">
          <div class="item-info">Tote Bag Estruturada</div>
        </article>

        <article class="item vestuario">
          <img src="https://placehold.co/1080x1350/0d0d0d/8b0000?text=Top+Underground" alt="Top Crochê">
          <div class="item-info">Top Underground</div>
        </article>

        <article class="item decoracao">
          <img src="https://placehold.co/1080x1080/1a1a1a/8b0000?text=Sousplat" alt="Sousplat">
          <div class="item-info">Sousplat Temático</div>
        </article>

        <article class="item mascaras">
          <img src="https://placehold.co/1080x1350/1a1a1a/e0e0e0?text=Mascaras+Custom" alt="Máscara Custom">
          <div class="item-info">Máscara Customizada</div>
        </article>

      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      <p>Integrante do Grupo <strong>Frajolaria</strong></p>
      <div class="redes">
        <a href="#">@Pontocego.oni</a> | <a href="#">@Oni_san.tos</a>
      </div>
    </footer>

    <script type="module" src="./src/main.js"></script>
    <!-- VISUALIZADOR DE IMAGEM (MODAL) -->
<div id="lightbox" class="lightbox-hidden">
  <span id="close-lightbox">&times;</span>
  <img id="lightbox-img" src="" alt="Zoom da Peça">
  <div id="lightbox-caption"></div>
</div>
  </body>
</html>
